# ============================================================
#  Free Fire — Sensitivity Config (Pro Player Build)
#  Patch     : OB53 | Versi: 1.4.2
#  Mode      : Auto Headshot + No Recoil
#  Optimized : PUBG-style aim feel
# ============================================================

[sensitivity_profile]
profile_name=IWX_PRO_OB53
profile_version=1.4.2
last_updated=2026-06-05
region=ID

# --- GENERAL SENSITIVITY ---
# Nilai: 0-100 | Recommended: 95-100 untuk spray
general=100
free_look=55

# --- SCOPE SENSITIVITY ---
# Makin tinggi = aim makin cepat (cocok close-range)
# Makin rendah = aim makin stabil (cocok long-range sniper)
red_dot=98
2x_scope=93
4x_scope=87
8x_scope=76
awm_scope=68
3x_scope=90
6x_scope=80

# --- GYROSCOPE (Nonaktif default) ---
# Set ke 1 untuk aktifkan gyro
gyroscope_enabled=0
gyroscope_general=65
gyroscope_red_dot=60
gyroscope_2x=55
gyroscope_4x=45
gyroscope_8x=35

# --- VEHICLE ---
vehicle_drive=60
vehicle_aim=55

# --- DRAG HEADSHOT ---
drag_headshot_enabled=1
drag_headshot_sensitivity=85
drag_headshot_lock_radius=40

# --- AIM ASSIST ---
aim_assist=1
aim_assist_strength=10
aim_assist_range=150
aim_lock_duration=250
target_switch_sensitivity=70

# --- RECOIL CONTROL ---
vertical_recoil_control=95
horizontal_recoil_control=90
spray_control_auto=1
spray_control_single=1

# --- ONE-TAP SETTINGS ---
one_tap_enabled=1
one_tap_sensitivity=100
one_tap_target=head

# ============================================================
# EOF — sensitivity_ob53.cfg | IWX ConfigPack OB53
