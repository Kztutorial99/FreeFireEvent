# ============================================================
#  Free Fire — Graphics Config
#  Patch     : OB53 | Build 2026060501
#  Mode      : Ultra Performance (Anti-Lag + Max FPS)
#  Target    : 90 FPS stable on mid-range devices
# ============================================================

[graphics_profile]
profile_name=ULTRA_PERFORMANCE_OB53
target_fps=90
min_fps=60
fps_lock=1

# --- RESOLUTION ---
render_width=1920
render_height=1080
render_scale=100
dynamic_resolution=0
ui_scale=100

# --- QUALITY PRESETS ---
# Options: low / medium / high / ultra / custom
overall_quality=custom
auto_adjust=0

# --- SHADOWS ---
shadow_enabled=0
shadow_quality=off
shadow_distance=0
character_shadow=0
environment_shadow=0

# --- TEXTURES ---
texture_quality=ultra
texture_filtering=anisotropic_4x
texture_streaming=1
texture_memory_limit=512

# --- ENVIRONMENT ---
environment_detail=low
vegetation_density=0
weather_effects=0
water_quality=low
terrain_quality=low
building_detail=medium

# --- CHARACTER ---
character_detail=ultra
character_lod_distance=200
npc_detail=low
animation_quality=high

# --- EFFECTS ---
particle_quality=low
explosion_quality=low
blood_effects=0
muzzle_flash=1
hit_effect=1
vfx_quality=low
post_processing=0

# --- ADVANCED ---
antialiasing=fxaa
bloom=0
motion_blur=0
depth_of_field=0
lens_flare=0
ambient_occlusion=0
god_rays=0
color_grading=off
hdr=0
screen_space_reflection=0

# --- PERFORMANCE ---
gpu_power_saving=0
thermal_optimization=1
memory_optimization=1
background_render=0
render_thread_priority=high
gpu_instancing=1
occlusion_culling=1

# --- DISPLAY ---
brightness=55
contrast=50
saturation=60
color_mode=vivid
blue_light_filter=0
max_brightness_outdoor=1

# ============================================================
# EOF — graphics_ob53.cfg | IWX ConfigPack OB53
