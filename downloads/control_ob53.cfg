# ============================================================
#  Free Fire — Control Layout Config
#  Patch     : OB53 | Layout: PRO 4-FINGER
#  Style     : CLAW / 4-Finger
#  Device    : Optimized for 6.0"+ screen
# ============================================================

[control_profile]
profile_name=PRO_4FINGER_OB53
profile_version=2.1
layout_type=4_finger_claw
screen_size_inch=6.5
orientation=landscape

# --- JOYSTICK ---
joystick_size=105
joystick_position_x=8
joystick_position_y=70
joystick_transparency=70
joystick_fixed=0
joystick_type=floating

# --- FIRE BUTTON ---
fire_button_size=120
fire_button_position_x=88
fire_button_position_y=72
fire_button_transparency=80
fire_button_shape=circle
auto_fire=0

# --- AIM BUTTON ---
aim_button_size=80
aim_button_position_x=82
aim_button_position_y=58
aim_button_transparency=75

# --- JUMP/CROUCH ---
jump_button_size=72
jump_position_x=91
jump_position_y=48
crouch_button_size=68
crouch_position_x=79
crouch_position_y=48

# --- PRONE ---
prone_button_size=60
prone_position_x=85
prone_position_y=40

# --- RELOAD ---
reload_button_size=65
reload_position_x=18
reload_position_y=55

# --- INVENTORY ---
inventory_position_x=92
inventory_position_y=15
inventory_button_size=58

# --- MELEE ---
melee_button_size=62
melee_position_x=74
melee_position_y=58
melee_auto=0

# --- GADGETS ---
gadget_1_size=58
gadget_2_size=58
gadget_3_size=55
gadget_4_size=55
gadget_bar_position=left

# --- ADVANCED CONTROLS ---
auto_sprint=0
auto_prone=0
peek_and_shoot=1
auto_pick_items=1
auto_open_door=1
auto_vault=1
quick_switch_weapons=1
one_tap_fire=0
drag_to_aim=1

# --- SENSITIVITY OVERRIDE ---
touch_sensitivity=high
multi_touch_priority=fire
input_polling_rate=240

# ============================================================
# EOF — control_ob53.cfg | IWX ConfigPack OB53
