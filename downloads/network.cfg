# ============================================================
#  Free Fire — Network Optimization Config
#  Patch     : OB53 | Mode: Ultra Low Latency
#  Target    : <30ms ping on ID server
# ============================================================

[network_profile]
profile_name=ULTRA_LOW_LATENCY_ID
region=ID
primary_server=id.freefiremobile.com
backup_server=id2.freefiremobile.com
cdn=https://cdn.freefiremobile.com

[connection]
protocol=UDP
tcp_fallback=1
connection_timeout=6000
keepalive_interval=5000
reconnect_max_attempts=5
reconnect_delay_ms=1000
packet_size_optimize=1
mtu=1400

[optimization]
ping_optimizer=1
packet_loss_compensation=1
adaptive_bitrate=1
bandwidth_throttle=0
udp_priority=1
qos_enabled=1
jitter_buffer=20
latency_mode=ultra_low
congestion_control=bbr

[dns]
primary_dns=8.8.8.8
secondary_dns=1.1.1.1
dns_over_https=1
dns_cache=1
dns_cache_ttl=300

[proxy]
proxy_enabled=0
proxy_type=none

[bandwidth]
max_upload_kbps=2048
max_download_kbps=8192
background_bandwidth_limit=512
voice_chat_bandwidth=128
data_saving_mode=0

[security]
ssl_verify=1
certificate_pinning=1
man_in_middle_protection=1
packet_encrypt=aes256
session_token_refresh=1
token_refresh_interval=3600

# ============================================================
# EOF — network.cfg | IWX ConfigPack OB53
