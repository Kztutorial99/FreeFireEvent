name: Deploy to Vercel (Manual)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan deploy (opsional)'
        required: false
        default: 'Manual deploy'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_BPVv9dNQJpt8oVOxdpUj0l5DsbqO
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Notify Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          COMMIT="${{ github.sha }}"
          REASON="${{ github.event.inputs.reason }}"
          ACTOR="${{ github.actor }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
            MSG="DEPLOY BERHASIL"
          else
            ICON="❌"
            MSG="DEPLOY GAGAL"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TG_CHAT}\",
              \"parse_mode\": \"HTML\",
              \"text\": \"${ICON} <b>${MSG}</b>\n━━━━━━━━━━━━━━━━\nCommit: <code>${COMMIT:0:8}</code>\nAlasan: ${REASON}\nOleh: ${ACTOR}\nURL: https://eventfreefire.vercel.app\"
            }"
